[project]
name = "ui_renderer"
version = "0.1.0"
description = "UI Renderer - converts UIDocument to JSON-serializable output"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = ["pytest", "pytest-cov"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/renderer.py"]
