<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-label="HUXForm architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0b0e"/>
      <stop offset="1" stop-color="#07080a"/>
    </linearGradient>
    <pattern id="dots" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#ffffff" fill-opacity=".02"/>
    </pattern>
    <style>
      .ink   { fill: #ece8dd; }
      .dim   { fill: #b9b3a3; }
      .faint { fill: #75716a; }
      .signal{ fill: #e8633a; }
      .mono  { font-family: ui-monospace,'JetBrains Mono',Consolas,monospace; }
      .serif { font-family: 'Fraunces','GT Sectra',Georgia,serif; }
      .box   { fill: none; stroke: #ece8dd; stroke-width: 1.2; }
      .box-soft { fill: none; stroke: #3d3b36; stroke-width: 1; }
      .arrow { fill: none; stroke: #ece8dd; stroke-width: 1; }
      .arrow-soft { fill: none; stroke: #3d3b36; stroke-width: 1; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ece8dd"/>
    </marker>
    <marker id="as" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d3b36"/>
    </marker>
  </defs>

  <rect width="1600" height="720" fill="url(#bg)"/>
  <rect width="1600" height="720" fill="url(#dots)"/>

  <!-- Top eyebrow -->
  <text x="80" y="62" class="mono dim" font-size="11" letter-spacing="4">ARCHITECTURE · ONE PASS, ONE STAGE</text>
  <line x1="80" y1="74" x2="1520" y2="74" stroke="#1a1d24"/>

  <!-- Stage rectangles -->

  <!-- 1. Intent -->
  <g transform="translate(80 130)">
    <rect width="220" height="120" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">01 · INTENT</text>
    <text x="16" y="68" class="serif ink" font-style="italic" font-size="22">User describes</text>
    <text x="16" y="94" class="serif ink" font-style="italic" font-size="22">a task in one line.</text>
  </g>

  <!-- 2. Director -->
  <g transform="translate(360 130)">
    <rect width="320" height="240" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">02 · DIRECTOR</text>
    <text x="16" y="64" class="serif ink" font-style="italic" font-size="22">Plan + Visual Brief</text>
    <text x="16" y="98" class="mono dim" font-size="11" letter-spacing="1.5">presentation_mode</text>
    <text x="16" y="116" class="mono dim" font-size="11" letter-spacing="1.5">visual_concept</text>
    <text x="16" y="134" class="mono dim" font-size="11" letter-spacing="1.5">metaphor · palette · type</text>
    <text x="16" y="152" class="mono dim" font-size="11" letter-spacing="1.5">tool_hints · steps</text>
    <text x="16" y="170" class="mono dim" font-size="11" letter-spacing="1.5">banned_patterns</text>
    <!-- swatches -->
    <g transform="translate(16 196)">
      <rect width="36" height="14" fill="#e8633a" opacity=".75"/>
      <rect x="40" width="36" height="14" fill="#87b178" opacity=".55"/>
      <rect x="80" width="36" height="14" fill="#d6a04c" opacity=".55"/>
      <rect x="120" width="36" height="14" fill="#ece8dd" opacity=".3"/>
    </g>
    <text x="180" y="208" class="mono faint" font-size="10" letter-spacing="2">PALETTE PROOF</text>
  </g>

  <!-- 3. UI Generator -->
  <g transform="translate(740 130)">
    <rect width="320" height="240" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">03 · UI GENERATOR</text>
    <text x="16" y="64" class="serif ink" font-style="italic" font-size="22">HTML · CSS · JS</text>
    <text x="16" y="98" class="mono dim" font-size="11" letter-spacing="1.5">implements the brief</text>
    <text x="16" y="116" class="mono dim" font-size="11" letter-spacing="1.5">literally — no defaults</text>
    <!-- mini doc -->
    <g transform="translate(16 140)" class="box-soft">
      <rect width="280" height="80"/>
      <line x1="0" y1="14" x2="280" y2="14"/>
      <line x1="0" y1="34" x2="200" y2="34"/>
      <line x1="0" y1="48" x2="160" y2="48"/>
      <line x1="0" y1="62" x2="240" y2="62"/>
    </g>
  </g>

  <!-- 4. Sandboxed Stage -->
  <g transform="translate(1120 130)">
    <rect width="400" height="240" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">04 · SANDBOXED STAGE</text>
    <text x="16" y="64" class="serif ink" font-style="italic" font-size="22">iframe · allow-scripts</text>
    <text x="16" y="98" class="mono dim" font-size="11" letter-spacing="1.5">no same-origin · no fetch</text>
    <text x="16" y="116" class="mono dim" font-size="11" letter-spacing="1.5">window.agui is the only bridge</text>
    <!-- mock stage -->
    <g transform="translate(16 140)" class="box-soft">
      <rect width="360" height="80"/>
      <rect x="12" y="12" width="80" height="14" fill="#e8633a" opacity=".7"/>
      <rect x="12" y="34" width="220" height="6" fill="#ece8dd" opacity=".18"/>
      <rect x="12" y="48" width="180" height="6" fill="#ece8dd" opacity=".12"/>
      <rect x="12" y="60" width="120" height="6" fill="#ece8dd" opacity=".08"/>
      <rect x="260" y="12" width="90" height="60" fill="#87b178" opacity=".35"/>
    </g>
  </g>

  <!-- Bottom row: bridge + broker + tools -->

  <g transform="translate(360 460)">
    <rect width="320" height="180" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">BRIDGE</text>
    <text x="16" y="62" class="serif ink" font-style="italic" font-size="20">window.agui.*</text>
    <text x="16" y="92" class="mono dim" font-size="11">callTool(name, params)</text>
    <text x="16" y="110" class="mono dim" font-size="11">uploadFile(file)</text>
    <text x="16" y="128" class="mono dim" font-size="11">readFile(id)</text>
    <text x="16" y="146" class="mono dim" font-size="11">askApproval(label)</text>
    <text x="16" y="164" class="mono dim" font-size="11">onEvent(handler)</text>
  </g>

  <g transform="translate(740 460)">
    <rect width="320" height="180" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">EXECUTOR · BROKER</text>
    <text x="16" y="62" class="serif ink" font-style="italic" font-size="20">Permission layer</text>
    <text x="16" y="92" class="mono dim" font-size="11">read → no-prompt</text>
    <text x="16" y="110" class="mono dim" font-size="11">write → confirmation</text>
    <text x="16" y="128" class="mono dim" font-size="11">destructive → dry-run + nod</text>
    <text x="16" y="146" class="mono dim" font-size="11">deploy / payment / DNS → flow</text>
    <text x="16" y="164" class="mono dim" font-size="11">audit log per action</text>
  </g>

  <g transform="translate(1120 460)">
    <rect width="400" height="180" class="box"/>
    <text x="16" y="28" class="mono signal" font-size="10" letter-spacing="3">TOOL DISCOVERY</text>
    <g transform="translate(16 56)">
      <rect width="84" height="36" class="box-soft"/>
      <text x="42" y="22" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="2">BUILTIN</text>
    </g>
    <g transform="translate(108 56)">
      <rect width="84" height="36" class="box-soft"/>
      <text x="42" y="22" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="2">MCP</text>
    </g>
    <g transform="translate(200 56)">
      <rect width="84" height="36" class="box-soft"/>
      <text x="42" y="22" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="2">OPENAPI</text>
    </g>
    <g transform="translate(292 56)">
      <rect width="84" height="36" class="box-soft"/>
      <text x="42" y="22" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="2">CLI</text>
    </g>
    <text x="16" y="124" class="mono dim" font-size="11">every tool registered as</text>
    <text x="16" y="142" class="mono dim" font-size="11">a typed capability —</text>
    <text x="16" y="160" class="mono ink" font-size="11">callable from any generated UI.</text>
  </g>

  <!-- Arrows -->
  <line x1="300" y1="190" x2="360" y2="190" class="arrow" marker-end="url(#a)"/>
  <line x1="680" y1="250" x2="740" y2="250" class="arrow" marker-end="url(#a)"/>
  <line x1="1060" y1="250" x2="1120" y2="250" class="arrow" marker-end="url(#a)"/>

  <!-- Stage → Bridge (down) -->
  <path d="M 1300 370 L 1300 410 L 520 410 L 520 460" class="arrow" marker-end="url(#a)"/>
  <!-- Bridge → Executor -->
  <line x1="680" y1="550" x2="740" y2="550" class="arrow" marker-end="url(#a)"/>
  <!-- Executor → Tools -->
  <line x1="1060" y1="550" x2="1120" y2="550" class="arrow" marker-end="url(#a)"/>

  <!-- Return path (events) -->
  <path d="M 1320 460 L 1320 410 L 1180 410 L 1180 370" class="arrow-soft" stroke-dasharray="4 3" marker-end="url(#as)"/>

  <!-- footer -->
  <text x="80" y="700" class="mono faint" font-size="10" letter-spacing="3">EVERY TASK · ITS OWN SHAPE · ONE PASS · ONE SAFE STAGE</text>
</svg>
