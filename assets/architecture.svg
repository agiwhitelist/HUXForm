<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Morphic architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0b0d14"/>
      <stop offset="100%" stop-color="#0d0a16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#FF8A5C"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C5CFF"/>
    </marker>
    <marker id="arrow-warm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF8A5C"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
    <!-- Title -->
    <text x="600" y="44" text-anchor="middle" font-size="18" font-weight="600" fill="#e7ebf3" letter-spacing="0.5">
      Intent → Plan + Visual Brief → Generated Mini-app → Bridged Tools
    </text>

    <!-- 1. user intent -->
    <g transform="translate(40,110)">
      <rect width="200" height="84" rx="12" fill="#11151c" stroke="#312A45"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">user intent</text>
      <text x="20" y="52" font-size="11.5" fill="#9aa3b2">+ optional file attachments</text>
      <text x="20" y="68" font-size="11.5" fill="#9aa3b2">+ thread context</text>
    </g>

    <!-- arrow -->
    <line x1="244" y1="152" x2="296" y2="152" stroke="#7C5CFF" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- 2. director -->
    <g transform="translate(300,80)">
      <rect width="240" height="144" rx="12" fill="#161427" stroke="url(#accent)"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">Director (LLM)</text>
      <text x="20" y="54" font-size="11.5" fill="#9aa3b2">presentation_mode</text>
      <text x="20" y="72" font-size="11.5" fill="#9aa3b2">visual_concept</text>
      <text x="20" y="90" font-size="11.5" fill="#9aa3b2">visual_brief: metaphor, palette,</text>
      <text x="20" y="106" font-size="11.5" fill="#9aa3b2">  typography, layout, motion,</text>
      <text x="20" y="122" font-size="11.5" fill="#9aa3b2">  banned_patterns, inspirations</text>
    </g>

    <!-- arrow to plan steering -->
    <line x1="544" y1="152" x2="596" y2="152" stroke="#7C5CFF" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- 3. plan steering -->
    <g transform="translate(600,110)">
      <rect width="160" height="84" rx="12" fill="#1d1929" stroke="#7C5CFF" stroke-dasharray="4 3"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">plan steering</text>
      <text x="20" y="52" font-size="11.5" fill="#9aa3b2">human: proceed?</text>
      <text x="20" y="68" font-size="11.5" fill="#9aa3b2">cancel · refine · ↻</text>
    </g>

    <!-- arrow to codegen -->
    <line x1="764" y1="152" x2="816" y2="152" stroke="#7C5CFF" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- 4. codegen -->
    <g transform="translate(820,80)">
      <rect width="340" height="144" rx="12" fill="#161427" stroke="url(#accent)"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">UI Generator (LLM)</text>
      <text x="20" y="54" font-size="11.5" fill="#9aa3b2">consumes brief literally</text>
      <text x="20" y="72" font-size="11.5" fill="#9aa3b2">forbids generic SaaS defaults</text>
      <text x="20" y="90" font-size="11.5" fill="#9aa3b2">emits one self-contained HTML doc</text>
      <text x="20" y="108" font-size="11.5" fill="#9aa3b2">runtime stub injected on serve</text>
    </g>

    <!-- arrow downward to iframe -->
    <line x1="990" y1="234" x2="990" y2="288" stroke="#7C5CFF" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- 5. iframe sandbox -->
    <g transform="translate(820,290)">
      <rect width="340" height="120" rx="12" fill="#0d1015" stroke="#5BD2A2"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">sandboxed iframe</text>
      <text x="20" y="54" font-size="11.5" fill="#9aa3b2">sandbox="allow-scripts" · NO same-origin</text>
      <text x="20" y="72" font-size="11.5" fill="#9aa3b2">no fetch, no cookies, no parent DOM</text>
      <text x="20" y="92" font-size="11.5" fill="#5BD2A2">window.agui.* is the only escape hatch</text>
    </g>

    <!-- bidirectional arrow between iframe and bridge -->
    <line x1="820" y1="350" x2="668" y2="350" stroke="#FF8A5C" stroke-width="1.5" marker-end="url(#arrow-warm)"/>
    <line x1="668" y1="370" x2="820" y2="370" stroke="#FF8A5C" stroke-width="1.5" marker-end="url(#arrow-warm)"/>

    <!-- 6. bridge -->
    <g transform="translate(440,290)">
      <rect width="220" height="120" rx="12" fill="#161427" stroke="#FF8A5C"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">AGUI Bridge</text>
      <text x="20" y="54" font-size="11.5" fill="#9aa3b2">postMessage proxy</text>
      <text x="20" y="72" font-size="11.5" fill="#9aa3b2">SSE event fan-out</text>
      <text x="20" y="92" font-size="11.5" fill="#9aa3b2">approval requests up</text>
    </g>

    <!-- 7. broker -->
    <line x1="440" y1="360" x2="288" y2="360" stroke="#FF8A5C" stroke-width="1.5" marker-end="url(#arrow-warm)"/>
    <g transform="translate(40,290)">
      <rect width="240" height="120" rx="12" fill="#161427" stroke="url(#accent)"/>
      <text x="20" y="30" font-size="13" fill="#e7ebf3" font-weight="600">Tool Broker · Permissions</text>
      <text x="20" y="54" font-size="11.5" fill="#9aa3b2">risk-class routing</text>
      <text x="20" y="72" font-size="11.5" fill="#9aa3b2">approvals · dry-run · cancel</text>
      <text x="20" y="92" font-size="11.5" fill="#9aa3b2">audit log</text>
    </g>

    <!-- 8. capabilities -->
    <line x1="160" y1="410" x2="160" y2="466" stroke="#7C5CFF" stroke-width="1.5" marker-end="url(#arrow)"/>
    <g transform="translate(40,470)">
      <rect width="1120" height="64" rx="12" fill="#11151c" stroke="#312A45"/>
      <text x="22" y="26" font-size="11.5" fill="#a89cff" letter-spacing="1.6">CAPABILITIES</text>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9aa3b2">
        <text x="22" y="48">built-in: llm.ask · llm.structured · web.search · data.parse_csv · data.find_duplicates · data.summarize · files.read · task.*</text>
        <text x="22" y="60">discovered: mcp.&lt;alias&gt;.&lt;tool&gt; (stdio) · openapi.&lt;alias&gt;.&lt;op&gt; · cli.&lt;name&gt;</text>
      </g>
    </g>
  </g>
</svg>
