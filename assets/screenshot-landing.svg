<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Morphic landing screen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#08090c"/>
      <stop offset="100%" stop-color="#0d0a16"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.85" cy="0.05" r="0.6">
      <stop offset="0%"  stop-color="#7C5CFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.05" cy="1" r="0.5">
      <stop offset="0%"  stop-color="#5BD2A2" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5BD2A2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#g1)"/>
  <rect width="1200" height="760" fill="url(#g2)"/>

  <!-- top bar -->
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#1f2530"/>
  <g transform="translate(20,18)">
    <circle cx="10" cy="10" r="6" fill="#7C5CFF"/>
    <text x="26" y="14" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e7ebf3" letter-spacing="0.5">Morphic</text>
    <text x="100" y="14" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">generative human-experience runtime</text>
  </g>
  <g transform="translate(1080,16)">
    <rect width="86" height="26" rx="13" fill="transparent" stroke="#1f2530"/>
    <text x="22" y="18" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#9aa3b2">Threads</text>
  </g>

  <!-- centered prompt -->
  <g transform="translate(220,160)">
    <text x="0" y="32" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="34" font-weight="600" fill="#e7ebf3" letter-spacing="-0.6">
      Опиши задачу — Morphic придумает интерфейс под неё.
    </text>
    <text x="0" y="74" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="15" fill="#9aa3b2">
      Не чат. Не дашборд-конструктор. Каждый раз — уникальный мини-app
    </text>
    <text x="0" y="96" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="15" fill="#9aa3b2">
      под конкретную задачу, в безопасном sandbox.
    </text>

    <!-- prompt textarea -->
    <g transform="translate(0,130)">
      <rect width="760" height="170" rx="14" fill="#11151c" stroke="#1f2530"/>
      <text x="18" y="32" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#e7ebf3">
        Проверь этот CSV на дубли — закроем повторные обращения и выгрузим
      </text>
      <text x="18" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#e7ebf3">
        отчёт по группам.
      </text>
      <line x1="18" y1="78" x2="22" y2="78" stroke="#7C5CFF" stroke-width="2">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- file pill -->
    <g transform="translate(0,316)">
      <rect width="220" height="28" rx="14" fill="#161b24" stroke="#1f2530"/>
      <text x="14" y="19" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#e7ebf3">📎 contacts_2024.csv</text>
      <text x="158" y="19" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">42.1KB</text>
    </g>

    <!-- actions -->
    <g transform="translate(0,360)">
      <rect width="92" height="34" rx="10" fill="transparent" stroke="#1f2530"/>
      <text x="34" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9aa3b2">Attach</text>

      <g transform="translate(108,8)">
        <rect width="14" height="14" rx="3" fill="#7C5CFF"/>
        <text x="22" y="13" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9aa3b2">Auto-proceed past plan</text>
      </g>

      <g transform="translate(540,0)">
        <rect width="220" height="34" rx="12" fill="#7C5CFF"/>
        <text x="36" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#0a0e16">Generate experience  ⌘↵</text>
      </g>
    </g>

    <!-- examples -->
    <g transform="translate(0,420)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5">
      <g>
        <rect width="240" height="28" rx="14" fill="#11151c" stroke="#1f2530"/>
        <text x="14" y="19" fill="#9aa3b2">Найди 10 Instagram-блогеров…</text>
      </g>
      <g transform="translate(252,0)">
        <rect width="220" height="28" rx="14" fill="#11151c" stroke="#1f2530"/>
        <text x="14" y="19" fill="#9aa3b2">Аудит лендинга example.com</text>
      </g>
      <g transform="translate(484,0)">
        <rect width="220" height="28" rx="14" fill="#11151c" stroke="#1f2530"/>
        <text x="14" y="19" fill="#9aa3b2">Сравни 3 платёжки для SaaS</text>
      </g>
    </g>
  </g>
</svg>
