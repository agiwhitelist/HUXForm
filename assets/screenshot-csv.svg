<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Morphic — CSV cleaning workbench (generated UI)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#08090c"/>
      <stop offset="100%" stop-color="#0d0a16"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FBF6E9"/>
      <stop offset="100%" stop-color="#F1E8D0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- top bar -->
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#1f2530"/>
  <g transform="translate(20,18)">
    <circle cx="10" cy="10" r="6" fill="#7C5CFF"/>
    <text x="26" y="14" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e7ebf3">Morphic</text>
  </g>

  <!-- user message -->
  <g transform="translate(70,84)">
    <rect width="48" height="22" rx="6" fill="#221c3a" stroke="#3b3175"/>
    <text x="14" y="16" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#a89cff" letter-spacing="1">YOU</text>
    <g transform="translate(64,0)">
      <rect width="1000" height="46" rx="12" fill="#11151c" stroke="#1f2530"/>
      <text x="14" y="19" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e7ebf3">Проверь этот CSV на дубли — закроем повторные обращения и выгрузим отчёт по группам.</text>
      <g transform="translate(14,28)">
        <rect width="170" height="14" rx="7" fill="#161b24" stroke="#1f2530"/>
        <text x="10" y="11" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#e7ebf3">📎 contacts_2024.csv</text>
        <text x="142" y="11" font-family="ui-sans-serif, system-ui, sans-serif" font-size="8" fill="#6b7280">42KB</text>
      </g>
    </g>
  </g>

  <!-- plan card -->
  <g transform="translate(70,160)">
    <rect width="1064" height="120" rx="14" fill="#161b24" stroke="#1f2530"/>
    <g>
      <rect x="14" y="14" width="118" height="22" rx="6" fill="#221c3a" stroke="#3b3175"/>
      <text x="26" y="29" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#a89cff" letter-spacing="1">GENERATED_APP</text>
      <text x="146" y="29" font-family="ui-monospace, monospace" font-size="13" fill="#e7ebf3">duplicate_bench</text>

      <text x="14" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e7ebf3">
        A bench-top duplicate finder built like an analog mixing console — horizontal rails of grouped specimens.
      </text>

      <!-- palette -->
      <g transform="translate(14,72)">
        <rect width="22" height="22" rx="6" fill="#FBF6E9"/>
        <rect x="28" width="22" height="22" rx="6" fill="#3a2c12"/>
        <rect x="56" width="22" height="22" rx="6" fill="#9c5b2a"/>
        <rect x="84" width="22" height="22" rx="6" fill="#cc6e3b"/>
        <rect x="112" width="22" height="22" rx="6" fill="#5b8a59"/>
      </g>

      <!-- inspirations -->
      <text x="160" y="86" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">
        inspirations · old-school spreadsheet ledger · brass laboratory tags · manuscript catalog
      </text>

      <g transform="translate(940,14)">
        <rect width="110" height="24" rx="8" fill="transparent" stroke="#1f2530"/>
        <text x="22" y="16" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#9aa3b2">Refine…  Regenerate ↻</text>
      </g>
    </g>
  </g>

  <!-- generated UI stage (workbench style — completely non-template) -->
  <g transform="translate(70,300)">
    <rect width="1064" height="404" rx="14" fill="#3a2c12" stroke="#3a2c12"/>
    <!-- inner "paper" -->
    <rect x="20" y="20" width="1024" height="364" rx="6" fill="url(#paper)"/>

    <!-- header strip -->
    <g transform="translate(40,40)">
      <text x="0" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#3a2c12" font-weight="700">Duplicate Bench</text>
      <text x="0" y="44" font-family="Georgia, serif" font-size="13" fill="#7a5a30" font-style="italic">contacts_2024.csv · 1,247 rows · 23 duplicate groups · 47 redundant rows</text>
      <line x1="0" y1="56" x2="980" y2="56" stroke="#7a5a30" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- column heads -->
    <g transform="translate(40,118)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#7a5a30" letter-spacing="1.2">
      <text x="0" y="12">SPECIMEN</text>
      <text x="120" y="12">NAME</text>
      <text x="320" y="12">EMAIL</text>
      <text x="540" y="12">SOURCE</text>
      <text x="700" y="12">FIRST SEEN</text>
      <text x="850" y="12">SCORE</text>
    </g>
    <line x1="40" y1="138" x2="1024" y2="138" stroke="#9c5b2a" stroke-width="1" opacity="0.5"/>

    <!-- group rows: rails of grouped specimens -->
    <g font-family="Georgia, serif" font-size="13" fill="#3a2c12">
      <!-- group 1 -->
      <g transform="translate(40,150)">
        <rect width="984" height="48" rx="3" fill="#FBF6E9" stroke="#9c5b2a" stroke-opacity=".2"/>
        <text x="8" y="20" font-family="ui-monospace, monospace" font-size="11" fill="#9c5b2a">G1·×4</text>
        <text x="120" y="18">Анна Кузнецова</text>     <text x="320" y="18">a.kuznetsova@mail.ru</text>
        <text x="540" y="18">support form</text>        <text x="700" y="18">12 Mar · 14 Mar · 19 Mar · 02 Apr</text>
        <text x="850" y="18">0.98</text>
        <text x="120" y="36" fill="#7a5a30" font-style="italic" font-size="11">4 emails normalized to one</text>
        <rect x="850" y="30" width="48" height="12" rx="2" fill="#cc6e3b" opacity=".25"/>
        <rect x="850" y="30" width="44" height="12" rx="2" fill="#cc6e3b"/>
      </g>
      <!-- group 2 -->
      <g transform="translate(40,206)">
        <rect width="984" height="48" rx="3" fill="#FBF6E9" stroke="#9c5b2a" stroke-opacity=".2"/>
        <text x="8" y="20" font-family="ui-monospace, monospace" font-size="11" fill="#9c5b2a">G2·×3</text>
        <text x="120" y="18">Дмитрий Соколов</text>     <text x="320" y="18">d.sokolov@gmail.com</text>
        <text x="540" y="18">chat widget</text>          <text x="700" y="18">04 Apr · 18 Apr · 22 Apr</text>
        <text x="850" y="18">0.92</text>
        <text x="120" y="36" fill="#7a5a30" font-style="italic" font-size="11">3 tickets to merge into one</text>
        <rect x="850" y="30" width="48" height="12" rx="2" fill="#cc6e3b" opacity=".25"/>
        <rect x="850" y="30" width="40" height="12" rx="2" fill="#cc6e3b"/>
      </g>
      <!-- group 3 -->
      <g transform="translate(40,262)">
        <rect width="984" height="48" rx="3" fill="#FBF6E9" stroke="#9c5b2a" stroke-opacity=".2"/>
        <text x="8" y="20" font-family="ui-monospace, monospace" font-size="11" fill="#9c5b2a">G3·×2</text>
        <text x="120" y="18">Ольга Петрова</text>       <text x="320" y="18">olga@yandex.ru</text>
        <text x="540" y="18">email</text>               <text x="700" y="18">11 Apr · 25 Apr</text>
        <text x="850" y="18">0.87</text>
        <text x="120" y="36" fill="#7a5a30" font-style="italic" font-size="11">two follow-ups, same author</text>
        <rect x="850" y="30" width="48" height="12" rx="2" fill="#cc6e3b" opacity=".25"/>
        <rect x="850" y="30" width="38" height="12" rx="2" fill="#cc6e3b"/>
      </g>
    </g>

    <!-- ledger footer -->
    <g transform="translate(40,326)">
      <line x1="0" y1="0" x2="984" y2="0" stroke="#7a5a30" stroke-width="1" opacity="0.4"/>
      <text x="0" y="22" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3a2c12">
        showing 1–3 of 23 groups · drag a card to mark for merge
      </text>
      <g transform="translate(800,2)">
        <rect width="180" height="28" rx="4" fill="#3a2c12"/>
        <text x="48" y="19" font-family="Georgia, serif" font-size="13" fill="#FBF6E9">Export merge plan ↗</text>
      </g>
    </g>
  </g>

  <!-- narration line below stage -->
  <g transform="translate(82,718)">
    <circle cx="0" cy="0" r="3" fill="#5BD2A2">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#9aa3b2">
      Found 23 duplicate groups · 47 redundant rows · waiting for your review
    </text>
  </g>

  <!-- status pill bottom -->
  <g transform="translate(82,738)">
    <rect width="60" height="18" rx="9" fill="transparent" stroke="#5bd29a"/>
    <text x="14" y="13" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" letter-spacing="1.4" fill="#5bd29a">RUNNING</text>
    <text x="76" y="13" font-family="ui-monospace, monospace" font-size="10" fill="#6b7280">in 1,842 · out 3,201</text>
    <text x="220" y="13" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#9aa3b2">Inspector · 38</text>
  </g>
</svg>
