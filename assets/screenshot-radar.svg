<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Morphic — influencer scouting radar (different generated UI)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#08090c"/>
      <stop offset="100%" stop-color="#0d0a16"/>
    </linearGradient>
    <radialGradient id="screen" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%"  stop-color="#072018"/>
      <stop offset="100%" stop-color="#040a08"/>
    </radialGradient>
    <radialGradient id="sweep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#5BD2A2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5BD2A2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- top bar -->
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#1f2530"/>
  <g transform="translate(20,18)">
    <circle cx="10" cy="10" r="6" fill="#7C5CFF"/>
    <text x="26" y="14" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e7ebf3">Morphic</text>
  </g>

  <!-- user message -->
  <g transform="translate(70,84)">
    <rect width="48" height="22" rx="6" fill="#221c3a" stroke="#3b3175"/>
    <text x="14" y="16" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#a89cff" letter-spacing="1">YOU</text>
    <g transform="translate(64,0)">
      <rect width="1000" height="28" rx="12" fill="#11151c" stroke="#1f2530"/>
      <text x="14" y="19" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e7ebf3">Найди 10 Instagram-блогеров для рекламы FasonAI, бюджет 5–10к ₽.</text>
    </g>
  </g>

  <!-- plan card -->
  <g transform="translate(70,140)">
    <rect width="1064" height="86" rx="14" fill="#161b24" stroke="#1f2530"/>
    <g>
      <rect x="14" y="14" width="98" height="22" rx="6" fill="#221c3a" stroke="#3b3175"/>
      <text x="26" y="29" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#a89cff" letter-spacing="1">STATUS_VIEW</text>
      <text x="124" y="29" font-family="ui-monospace, monospace" font-size="13" fill="#e7ebf3">influencer_scouting_radar</text>

      <text x="14" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9aa3b2">
        A circular sonar sweep with discovered influencers pinned on concentric range rings, weighted by engagement.
      </text>

      <!-- palette -->
      <g transform="translate(14,66)">
        <rect width="14" height="14" rx="3" fill="#040a08"/>
        <rect x="20" width="14" height="14" rx="3" fill="#0e1f17"/>
        <rect x="40" width="14" height="14" rx="3" fill="#5BD2A2"/>
        <rect x="60" width="14" height="14" rx="3" fill="#FFC36B"/>
        <rect x="80" width="14" height="14" rx="3" fill="#E7EBF3"/>
      </g>

      <g transform="translate(940,14)">
        <rect width="110" height="24" rx="8" fill="transparent" stroke="#1f2530"/>
        <text x="22" y="16" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#9aa3b2">Refine…  Regenerate ↻</text>
      </g>
    </g>
  </g>

  <!-- generated UI: radar -->
  <g transform="translate(70,250)">
    <rect width="1064" height="430" rx="14" fill="url(#screen)" stroke="#1a3528"/>

    <!-- left side: radar -->
    <g transform="translate(60,40)">
      <text x="0" y="14" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#5BD2A2">SCOUTING · CHANNEL 03 · ACTIVE</text>

      <!-- range rings -->
      <g transform="translate(180,200)">
        <circle r="180" stroke="#5BD2A2" stroke-width="0.6" fill="none" opacity=".35"/>
        <circle r="140" stroke="#5BD2A2" stroke-width="0.6" fill="none" opacity=".45"/>
        <circle r="100" stroke="#5BD2A2" stroke-width="0.6" fill="none" opacity=".55"/>
        <circle r="60"  stroke="#5BD2A2" stroke-width="0.6" fill="none" opacity=".7"/>
        <circle r="20"  stroke="#5BD2A2" stroke-width="0.8" fill="none"/>

        <!-- crosshairs -->
        <line x1="-180" y1="0" x2="180" y2="0" stroke="#5BD2A2" stroke-width="0.4" opacity=".25"/>
        <line x1="0" y1="-180" x2="0" y2="180" stroke="#5BD2A2" stroke-width="0.4" opacity=".25"/>

        <!-- sweep -->
        <path d="M 0 0 L 180 0 A 180 180 0 0 1 127 127 Z" fill="url(#sweep)" opacity=".7">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
        </path>

        <!-- pinned candidates -->
        <g>
          <circle cx="60"  cy="-22" r="3" fill="#FFC36B"/>
          <circle cx="40"  cy="50"  r="3" fill="#FFC36B"/>
          <circle cx="-72" cy="40"  r="3" fill="#5BD2A2"/>
          <circle cx="-110" cy="-18" r="3" fill="#5BD2A2"/>
          <circle cx="100" cy="80"  r="3" fill="#5BD2A2"/>
          <circle cx="-20" cy="-100" r="3" fill="#FFC36B"/>
          <circle cx="120" cy="-60" r="3" fill="#5BD2A2"/>
          <circle cx="-150" cy="80" r="3" fill="#5BD2A2"/>
          <circle cx="160" cy="20"  r="3" fill="#5BD2A2"/>
          <circle cx="0"   cy="-160" r="3" fill="#FFC36B"/>
        </g>
      </g>
    </g>

    <!-- right side: discovered candidates panel -->
    <g transform="translate(540,40)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#5BD2A2">
      <text x="0" y="14" letter-spacing="2">DISCOVERED · 47 SCANNED · 10 MATCHED</text>

      <!-- card list -->
      <g transform="translate(0,32)" font-family="ui-sans-serif, system-ui, sans-serif">
        <g>
          <rect width="460" height="56" rx="6" fill="#0a1d15" stroke="#1a3528"/>
          <text x="14" y="18" font-size="12" font-weight="600" fill="#E7EBF3">@anna.fashion · 38.4k</text>
          <text x="14" y="36" font-size="11" fill="#5BD2A2">audience fit 0.92 · est. ₽7,200 · ER 4.1%</text>
          <text x="14" y="50" font-size="10.5" font-style="italic" fill="#7da99a">tone: warm, direct · style aligns with FasonAI</text>
          <rect x="430" y="14" width="20" height="34" rx="4" fill="#FFC36B" opacity=".15"/>
          <rect x="430" y="14" width="20" height="32" rx="4" fill="#FFC36B"/>
        </g>
        <g transform="translate(0,64)">
          <rect width="460" height="56" rx="6" fill="#0a1d15" stroke="#1a3528"/>
          <text x="14" y="18" font-size="12" font-weight="600" fill="#E7EBF3">@k.minimal · 24.1k</text>
          <text x="14" y="36" font-size="11" fill="#5BD2A2">audience fit 0.86 · est. ₽5,800 · ER 5.3%</text>
          <text x="14" y="50" font-size="10.5" font-style="italic" fill="#7da99a">very high engagement, smaller base</text>
          <rect x="430" y="14" width="20" height="34" rx="4" fill="#FFC36B" opacity=".15"/>
          <rect x="430" y="14" width="20" height="28" rx="4" fill="#FFC36B"/>
        </g>
        <g transform="translate(0,128)">
          <rect width="460" height="56" rx="6" fill="#0a1d15" stroke="#1a3528"/>
          <text x="14" y="18" font-size="12" font-weight="600" fill="#E7EBF3">@dimaphoto · 51.7k</text>
          <text x="14" y="36" font-size="11" fill="#5BD2A2">audience fit 0.78 · est. ₽9,400 · ER 2.8%</text>
          <text x="14" y="50" font-size="10.5" font-style="italic" fill="#7da99a">at the upper budget edge</text>
          <rect x="430" y="14" width="20" height="34" rx="4" fill="#FFC36B" opacity=".15"/>
          <rect x="430" y="14" width="20" height="22" rx="4" fill="#FFC36B"/>
        </g>
        <g transform="translate(0,192)">
          <rect width="460" height="56" rx="6" fill="#0a1d15" stroke="#1a3528"/>
          <text x="14" y="18" font-size="12" font-weight="600" fill="#E7EBF3">+ 7 more candidates</text>
          <text x="14" y="36" font-size="11" fill="#5BD2A2">scanning instagram · 12 sources · ETA 23s</text>
          <g transform="translate(14,42)">
            <rect width="100" height="3" rx="2" fill="#1a3528"/>
            <rect width="62"  height="3" rx="2" fill="#5BD2A2"/>
          </g>
        </g>
      </g>

      <!-- status strip -->
      <g transform="translate(0,290)" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1.6" fill="#5BD2A2" opacity=".7">
        <text y="0">SOURCES   ▌▌▌▌▌▌▌░░░  12/16</text>
        <text y="14">FILTERED  ▌▌▌▌▌▌▌▌▌░  47/50</text>
        <text y="28">ENRICHED  ▌▌▌▌▌▌░░░░  31/47</text>
        <text y="42">SCORED    ▌▌▌▌▌▌▌▌▌▌  10/10</text>
      </g>
    </g>
  </g>

  <!-- narration -->
  <g transform="translate(82,710)">
    <circle cx="0" cy="0" r="3" fill="#5BD2A2">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#9aa3b2">
      Scanned 47 accounts · matched 10 within budget · enriching contacts now…
    </text>
  </g>
  <g transform="translate(82,732)">
    <rect width="60" height="18" rx="9" fill="transparent" stroke="#5bd29a"/>
    <text x="14" y="13" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" letter-spacing="1.4" fill="#5bd29a">RUNNING</text>
  </g>
</svg>
