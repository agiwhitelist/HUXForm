<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img" aria-label="HUXForm — the interface takes the shape of the task">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0b0e"/>
      <stop offset="1" stop-color="#07080a"/>
    </linearGradient>
    <radialGradient id="warm" cx="78%" cy="-10%" r="60%">
      <stop offset="0" stop-color="#e8633a" stop-opacity=".22"/>
      <stop offset="1" stop-color="#e8633a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="-10%" cy="110%" r="60%">
      <stop offset="0" stop-color="#87b178" stop-opacity=".08"/>
      <stop offset="1" stop-color="#87b178" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#ffffff" fill-opacity=".018"/>
    </pattern>
  </defs>

  <rect width="1600" height="480" fill="url(#bg)"/>
  <rect width="1600" height="480" fill="url(#warm)"/>
  <rect width="1600" height="480" fill="url(#cool)"/>
  <rect width="1600" height="480" fill="url(#dots)"/>

  <!-- HUXForm sigil: rotated square + vertical axis -->
  <g transform="translate(160 220)">
    <g transform="rotate(45)">
      <rect x="-40" y="-40" width="80" height="80" fill="none" stroke="#ece8dd" stroke-width="2"/>
    </g>
    <line x1="0" y1="-58" x2="0" y2="58" stroke="#ece8dd" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="208"
        font-family="'Fraunces','GT Sectra',Georgia,serif"
        font-style="italic" font-weight="300"
        font-size="96" letter-spacing="-1.5"
        fill="#ece8dd">HUXForm</text>

  <!-- Tag eyebrow -->
  <text x="262" y="252"
        font-family="ui-monospace,'JetBrains Mono',Consolas,monospace"
        font-size="14" letter-spacing="5.5"
        fill="#75716a">GENERATIVE HUMAN-EXPERIENCE RUNTIME</text>

  <!-- Big tagline -->
  <text x="160" y="372"
        font-family="'Fraunces','GT Sectra',Georgia,serif"
        font-style="italic" font-weight="300"
        font-size="36" letter-spacing="-0.4"
        fill="#b9b3a3">the interface takes the shape of the task.</text>

  <!-- Right side: composition study -->
  <g transform="translate(1080 80)" stroke="#ece8dd" stroke-width="1" fill="none" opacity=".42">
    <rect x="0" y="0" width="380" height="64"/>
    <rect x="0" y="84" width="240" height="148"/>
    <rect x="260" y="84" width="120" height="148"/>
    <rect x="0" y="252" width="120" height="68"/>
    <rect x="140" y="252" width="120" height="68"/>
    <rect x="280" y="252" width="100" height="68"/>
    <line x1="0" y1="40" x2="380" y2="40"/>
  </g>
  <g transform="translate(1080 80)" font-family="ui-monospace,'JetBrains Mono',Consolas,monospace"
     font-size="9" fill="#75716a" letter-spacing="2.5">
    <text x="10" y="22">SPECIMEN N°2024-MCP-001</text>
    <text x="10" y="106">METAPHOR</text>
    <text x="10" y="270">PALETTE</text>
    <text x="150" y="270">TYPE</text>
    <text x="290" y="270">MOTION</text>
  </g>
  <g transform="translate(1240 110)">
    <rect width="60" height="14" fill="#e8633a" opacity=".55"/>
    <rect y="20" width="60" height="14" fill="#87b178" opacity=".45"/>
    <rect y="40" width="60" height="14" fill="#d6a04c" opacity=".4"/>
  </g>
</svg>
