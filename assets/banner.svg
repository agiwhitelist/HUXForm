<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Morphic — generative human-experience runtime">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B0D14"/>
      <stop offset="100%" stop-color="#16131F"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%"  stop-color="#7C5CFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.5">
      <stop offset="0%"  stop-color="#FF8A5C" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FF8A5C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C9C2FF"/>
    </linearGradient>
    <linearGradient id="m-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#FF8A5C"/>
    </linearGradient>
    <linearGradient id="m-grad-2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5BD2A2"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow1)"/>
  <rect width="1200" height="360" fill="url(#glow2)"/>

  <!-- subtle morphing grid in the background -->
  <g opacity="0.28" stroke="#3a324f" stroke-width="1" fill="none">
    <circle cx="980"  cy="80"  r="160"/>
    <rect   x="820"  y="-60"  width="320" height="320" rx="64"/>
    <path   d="M 980 -60 L 1140 240 L 820 240 Z"/>
  </g>

  <!-- logo, scaled up -->
  <g transform="translate(80,110) scale(2.0)">
    <circle cx="32" cy="32" r="26" stroke="url(#m-grad-2)" stroke-width="2" stroke-dasharray="4 3" opacity=".7"/>
    <rect x="14" y="14" width="36" height="36" rx="9" stroke="url(#m-grad)" stroke-width="2.4" fill="none"/>
    <path d="M 32 21 L 45 43 L 19 43 Z" stroke="#FF8A5C" stroke-width="2.4" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="178"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="92" font-weight="700" letter-spacing="-2"
        fill="url(#text)">Morphic</text>

  <!-- tagline -->
  <text x="244" y="225"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0.2"
        fill="#A9A2C5">The interface takes the shape of the task.</text>

  <!-- pill: what it is -->
  <g transform="translate(244,250)">
    <rect width="430" height="34" rx="17" fill="#1A1729" stroke="#312A45"/>
    <text x="22" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#9ad1ff">generative human-experience runtime for AI agents</text>
  </g>

  <!-- right side: 3 mini "presentation modes" hinting at variety -->
  <g transform="translate(820,80)" opacity="0.95">
    <!-- card 1: status_view -->
    <g>
      <rect width="100" height="200" rx="12" fill="#16142a" stroke="#2b2547"/>
      <circle cx="50" cy="60" r="20" stroke="#7C5CFF" stroke-width="2" fill="none"/>
      <circle cx="50" cy="60" r="6" fill="#7C5CFF"/>
      <rect x="20" y="100" width="60" height="6" rx="3" fill="#3b3559"/>
      <rect x="20" y="116" width="44" height="6" rx="3" fill="#3b3559"/>
      <rect x="20" y="138" width="60" height="6" rx="3" fill="#7C5CFF"/>
    </g>
    <!-- card 2: deploy_console -->
    <g transform="translate(120,0)">
      <rect width="100" height="200" rx="12" fill="#10131a" stroke="#1f2a3a"/>
      <text x="14" y="24" font-family="ui-monospace, monospace" font-size="9" fill="#5bd29a">$ deploy</text>
      <text x="14" y="40" font-family="ui-monospace, monospace" font-size="9" fill="#5bd29a">  building...</text>
      <text x="14" y="56" font-family="ui-monospace, monospace" font-size="9" fill="#9aa3b2">  tests passed</text>
      <text x="14" y="72" font-family="ui-monospace, monospace" font-size="9" fill="#ffc36b">  deploying</text>
      <rect x="14" y="160" width="72" height="22" rx="4" fill="#1f2a3a" stroke="#2c3a52"/>
      <text x="22" y="175" font-family="ui-monospace, monospace" font-size="9" fill="#9aa3b2">rollback</text>
    </g>
    <!-- card 3: scouting_radar -->
    <g transform="translate(240,0)">
      <rect width="100" height="200" rx="12" fill="#1d1422" stroke="#3a2237"/>
      <circle cx="50" cy="80" r="38" stroke="#FF8A5C" stroke-width="1" fill="none" opacity=".5"/>
      <circle cx="50" cy="80" r="24" stroke="#FF8A5C" stroke-width="1" fill="none" opacity=".7"/>
      <circle cx="50" cy="80" r="10" stroke="#FF8A5C" stroke-width="1" fill="none"/>
      <circle cx="64" cy="68" r="3" fill="#FF8A5C"/>
      <circle cx="38" cy="92" r="3" fill="#FF8A5C"/>
      <circle cx="56" cy="96" r="3" fill="#FF8A5C"/>
      <rect x="14" y="138" width="72" height="6" rx="3" fill="#4a2c3a"/>
      <rect x="14" y="152" width="56" height="6" rx="3" fill="#4a2c3a"/>
      <rect x="14" y="172" width="72" height="14" rx="4" fill="#FF8A5C" opacity=".25"/>
    </g>
  </g>
</svg>
