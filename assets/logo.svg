<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Morphic logo">
  <defs>
    <linearGradient id="m-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#FF8A5C"/>
    </linearGradient>
    <linearGradient id="m-grad-2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5BD2A2"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>
  <!-- outer circle: the abstract context -->
  <circle cx="32" cy="32" r="26" stroke="url(#m-grad-2)" stroke-width="2" stroke-dasharray="4 3" opacity=".55"/>
  <!-- middle: rounded square -->
  <rect x="14" y="14" width="36" height="36" rx="9" stroke="url(#m-grad)" stroke-width="2.4"/>
  <!-- inner: triangle (the irreducible essence — the task) -->
  <path d="M 32 21 L 45 43 L 19 43 Z" stroke="#FF8A5C" stroke-width="2.4" stroke-linejoin="round"/>
</svg>
